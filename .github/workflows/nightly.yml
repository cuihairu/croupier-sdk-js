name: Nightly Build

on:
  schedule:
    - cron: "0 5 * * *"
  workflow_dispatch:

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - timeout-minutes: 3
        uses: actions/checkout@v5
        with:
          submodules: recursive
      - timeout-minutes: 5
        uses: pnpm/action-setup@v6
        # Use the pnpm version pinned via package.json#packageManager.
      - timeout-minutes: 5
        uses: actions/setup-node@v5
        with:
          node-version: 20
          cache: "pnpm"
          cache-dependency-path: pnpm-lock.yaml
      - name: Install dependencies
        timeout-minutes: 5
        run: pnpm install --frozen-lockfile
      - name: Build
        timeout-minutes: 15
        run: pnpm run build
      - name: Package
        timeout-minutes: 2
        run: |
          rm -rf artifacts
          mkdir -p artifacts
          pnpm pack --pack-destination artifacts
          zip -r "artifacts/croupier-js-sdk-nightly-${GITHUB_RUN_ID}.zip" dist package.json README.md LICENSE
      - name: Publish nightly release assets
        timeout-minutes: 10
        uses: softprops/action-gh-release@v3
        with:
          tag_name: nightly
          target_commitish: ${{ github.sha }}
          name: Nightly Build
          prerelease: true
          files: artifacts/*
          fail_on_unmatched_files: true
