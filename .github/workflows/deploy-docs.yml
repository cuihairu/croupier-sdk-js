name: Deploy Docs

on:
  push:
    branches: [main]
    paths: ['docs/**']
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - timeout-minutes: 3
        uses: actions/checkout@v5

      - timeout-minutes: 5
        uses: pnpm/action-setup@v6

      - timeout-minutes: 5
        uses: actions/setup-node@v5
        with:
          node-version: '22'
          cache: 'pnpm'
          cache-dependency-path: 'docs/pnpm-lock.yaml'

      - timeout-minutes: 10
        working-directory: ./docs
        run: pnpm install && pnpm build

      - timeout-minutes: 5
        uses: actions/upload-pages-artifact@v5
        with:
          path: ./docs/.vuepress/dist

  deploy:
    if: github.ref == 'refs/heads/main'
    environment:
      name: github-pages
    runs-on: ubuntu-latest
    timeout-minutes: 30
    needs: build
    steps:
      - timeout-minutes: 10
        uses: actions/deploy-pages@v5
